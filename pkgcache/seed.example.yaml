# Declarative pre-seed list for scripts/prefetch.py — pull a complete set through
# the online proxies before crossing the air gap (so checkpoint.sh captures it).
# Each entry is fetched via the canonical client path through the local proxy, so
# the cache + SQLite ledger populate exactly as a real install would.

# Container images: pulled as <host>:5000/<dest>/<image>
docker:
  - dockerhub/library/alpine:3.20
  - ghcr/astral-sh/uv:python3.12-bookworm-slim

# pip: "<index> <requirement>" — warmed with a plain single-connection download
pip:
  - "root/pypi numpy==2.1.0"
  - "root/pytorch-cu124 torch==2.6.0+cu124"

# npm packages (optionally @version)
npm:
  - left-pad
  - react@18.3.1

# apt / apk: full package names; resolved through the proxy
apt:
  - curl
apk:
  - ca-certificates
