# Six pull-through caching roles (OCI / npm / PyPI / apt+apk / git / files) as ONE
# Python container (./pkgcache) running one process on TWO ports: the unified HTTPS
# port :8443 carries docker (/v2/…) plus npm/pypi/git/files (/<project>/<role>/…),
# and :3142 is the apt/apk plain-HTTP forward proxy (proxy clients can't speak TLS,
# so it can't share the unified port). TLS terminates in-process from ./certs — no
# separate TLS proxy. Everything is written into ./caches/<eco> (DVC-tracked).
#
# Bring up online side:     docker compose --profile online up -d
# Bring up air-gapped side: OFFLINE=1 docker compose --profile offline up -d
#
# OFFLINE=1 makes every role serve from cache only and never reach upstream — this
# is the air-gap mode (a cache miss simply fails). Run scripts/gen-certs.sh once
# before `up` to populate ./certs.

services:
  # ---- the cache (all four roles, one process) ---------------------------
  pkgcache:
    build: ./pkgcache
    image: package-registry/pkgcache:local
    restart: unless-stopped
    # Run as the host user so everything written under ./caches is host-owned, not
    # root — this is what lets the webui's `dvc add`/`dvc checkout` and the operator
    # manage the cache without permission fights. All ports are >1024, so a non-root
    # process can bind them. IDs come from .env (see .env.example).
    user: "${PKGCACHE_UID:-1000}:${PKGCACHE_GID:-1000}"
    environment:
      OFFLINE: "${OFFLINE:-0}"
      PKGCACHE_CACHE_ROOT: /caches
      # The project registry the control UI manages. A project is a name (routed by
      # URL prefix on the shared ports) + its own cache tree under
      # /caches/projects/<name>. Read-only here; the webui is the only writer.
      PKGCACHE_PROJECTS: /config/projects.json
      PKGCACHE_TLS_CERT: /certs/server.crt
      PKGCACHE_TLS_KEY: /certs/server.key
      HOME: /tmp           # an arbitrary uid has no passwd home; keep libs that expand ~ happy
      # The host uid has no /etc/passwd entry in the image, so getpass.getuser()
      # (used by dvc, and some libs) would crash with KeyError. Name it explicitly.
      USER: pkgcache
      LOGNAME: pkgcache
    ports:
      # THE port: docker pull <host>:8443/[<project>/]{dockerhub,ghcr,quay}/<image>;
      # npm/pypi/git/files at https://<host>:8443/<project>/<role>/… ("global" is the
      # default project). Publish "443:8443" instead for port-less docker URLs (the
      # container binds >1024 because it runs as a non-root host uid).
      - "8443:8443"
      # apt + apk (HTTP forward proxy; project = proxy username <project>@host)
      - "3142:3142"
      # Projects are NOT separate ports: every project shares the two ports above and
      # is reached by a URL prefix (/<project>/<role>/… ; the OCI project rides the
      # image name, the apt project the proxy username). See pkgcache/unified.py.
    volumes:
      - ./caches:/caches        # global → /caches/<eco>; projects → /caches/projects/<name>/<eco>
      - ./config:/config:ro     # the project registry (config/projects.json), webui-managed
      - ./certs:/certs:ro
    networks:
      default:
        aliases: ["pkgcache"]
    profiles: ["online", "offline"]

  # ---- control UI --------------------------------------------------------
  # Own profile ("ui"), deliberately NOT in online/offline so a checkpoint's
  # `docker compose stop` never takes it down with the cache. Bring it up
  # alongside a cache profile, e.g.:
  #   docker compose --profile online --profile ui up -d
  #
  # webui is now the API backend only: the React console (`console` service)
  # is the public entry on :8088 and reverse-proxies /api here. webui is reached
  # over the compose network as webui:8088, so it no longer publishes a host port.
  webui:
    build: ./webui
    restart: unless-stopped
    expose: ["8088"]       # internal only — the console proxies /api to it
    # Same host-user mapping as pkgcache, so the cache repo's git objects, the DVC
    # store and manifests this service writes are owned by the operator, never root
    # (root-owned git objects are exactly what blocked the host from committing).
    # group_add gives the non-root container the host's docker-socket group, so it
    # can still drive `docker compose`. IDs + docker gid come from .env.
    user: "${PKGCACHE_UID:-1000}:${PKGCACHE_GID:-1000}"
    group_add:
      - "${DOCKER_GID:-999}"
    environment:
      UI_HOST: 0.0.0.0
      HOME: /tmp           # writable home for git/dvc config under an arbitrary uid
      USER: pkgcache       # uid has no /etc/passwd entry; dvc's getpass.getuser() needs this
      LOGNAME: pkgcache
      # Break-glass superuser (from .env). Setting these turns ON control-plane auth:
      # login + account/ownership enforcement. Leave unset to keep the API open.
      UI_ROOT_USER: "${UI_ROOT_USER:-}"
      UI_ROOT_PASSWORD: "${UI_ROOT_PASSWORD:-}"
      # Shuttle staging dir (from .env). Forwarded into the process env so the backend's
      # os.environ.get("PKGCACHE_SHUTTLE") sees it; empty falls back to ./shuttle.
      PKGCACHE_SHUTTLE: "${PKGCACHE_SHUTTLE:-}"
    working_dir: ${PWD}
    volumes:
      - .:${PWD}                              # repo at its own path (includes ./shuttle)
      - /var/run/docker.sock:/var/run/docker.sock
      # The shuttle staging dir defaults to ./shuttle (inside the repo mount above).
      # If you relocate it with PKGCACHE_SHUTTLE to a path OUTSIDE the repo, mount
      # that path here too, e.g.:  - ${PKGCACHE_SHUTTLE}:${PKGCACHE_SHUTTLE}
    profiles: ["ui"]

  # The React + TS console (full frontend). Built by a multi-stage image (Node →
  # nginx); nginx serves the static bundle and reverse-proxies /api to webui.
  # Public UI port (no auth — trusted nets only).
  console:
    build: ./webui/console
    image: package-registry/console:local
    restart: unless-stopped
    ports: ["8088:80"]
    depends_on: ["webui"]
    profiles: ["ui"]
