# Teach apt-cacher-ng to cache Alpine apk artifacts, which reach this proxy via
# `http_proxy` set inside Alpine-based docker builds (see docs/docker-builds.md).
#
# Loaded because apt-cacher-ng reads every *.conf in its config dir; the `zz-`
# mount name sorts after acng.conf. The *Ex options EXTEND the built-in default
# patterns rather than replacing them, so Debian/Ubuntu apt caching is unaffected.

# .apk packages are immutable (versioned filenames) -> precious, cache forever.
PfilePatternEx: \.apk$

# APKINDEX.tar.gz is the Alpine package index -> volatile, so it's revalidated
# upstream when online but still served from cache when upstream is unreachable
# (air-gapped side).
VfilePatternEx: APKINDEX\.tar\.gz$
