<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>pkgcache console</title>
    <!-- Apply the persisted theme before first paint so there's no flash of
         token-less content; App re-applies it after hydration. -->
    <script>
      try {
        document.documentElement.dataset.theme = localStorage.getItem("pcc_theme") || "dark";
      } catch (e) {
        /* private mode / no storage: keep the markup default */
      }
    </script>
    <!-- Inline SVG favicon: dark tile + accent [ ] brackets and a cursor block. -->
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='7' fill='%2310151a'/><rect x='0.6' y='0.6' width='30.8' height='30.8' rx='6.6' fill='none' stroke='%232b3540'/><path d='M13 8 H9 V24 H13' fill='none' stroke='%2345d98a' stroke-width='2.4' stroke-linecap='round' stroke-linejoin='round'/><path d='M19 8 H23 V24 H19' fill='none' stroke='%2345d98a' stroke-width='2.4' stroke-linecap='round' stroke-linejoin='round'/><rect x='14.4' y='13.6' width='3.2' height='4.8' rx='1' fill='%2345d98a'/></svg>"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
