# Serves the built SPA and reverse-proxies the API to the Python webui.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Resolve the `webui` service via Docker's embedded DNS at REQUEST time (not
    # config-load time). Combined with the variable proxy_pass below, this lets
    # nginx start and serve the SPA even when webui is down/absent — /api just
    # returns 502 instead of the whole container failing to boot.
    resolver 127.0.0.11 ipv6=off valid=10s;
    set $webui_upstream http://webui:8088;

    # The lockwarm flow POSTs the whole uv.lock as a JSON body; large projects
    # (CUDA/torch pin many files) produce multi-MB locks. nginx defaults to 1m,
    # which 413s the upload — and the SPA then chokes parsing the HTML error page.
    client_max_body_size 64m;

    # Long-cache the fingerprinted Vite assets; never cache the entry HTML.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # API + health → Python control UI (compose service name `webui`, port 8088).
    # Variable proxy_pass (no URI part) forwards the original request URI as-is.
    location /api/ {
        proxy_pass $webui_upstream;
        proxy_http_version 1.1;
        # $http_host (not $host): forward the exact Host the browser sent, INCLUDING
        # the port. The webui's CSRF Origin check compares the Origin's host to this;
        # $host drops the port, so the browser's `Origin: …:8088` would never match.
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Job/console polling and the progress feed are short requests; keep modest
        # timeouts but allow a slow checkpoint POST to complete.
        proxy_read_timeout 120s;
        proxy_buffering off;
    }
    location = /healthz {
        proxy_pass $webui_upstream;
    }

    # SPA fallback: any non-asset, non-API path serves the app shell.
    location / {
        try_files $uri /index.html;
    }
}
